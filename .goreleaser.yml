# .goreleaser.yml
project_name: moneytrack-api

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

release:
  github:
    owner: panosdim
    name: moneytrack-api

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
